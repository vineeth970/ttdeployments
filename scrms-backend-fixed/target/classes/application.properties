# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:scrmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT: Let Hibernate create tables first, then run SQL scripts
spring.jpa.defer-datasource-initialization=true

# IMPORTANT: Disable the empty data.sql from running (causes startup crash)
spring.sql.init.mode=never

# JWT
app.jwt.secret=scrms_super_secret_key_that_is_at_least_256_bits_long_for_hs256
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Disable mail auto-config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Logging
logging.level.com.scrms=DEBUG
logging.level.org.springframework.security=INFO