# ── Server ──────────────────────────────────────────────
server.port=8080

# ── H2 Database ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:scrmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────
app.jwt.secret=scrms_super_secret_key_that_is_at_least_256_bits_long_for_hs256
app.jwt.expiration-ms=86400000

# ── CORS ────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Mail (optional – disable if not needed) ─────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ─────────────────────────────────────────────
logging.level.com.scrms=DEBUG
logging.level.org.springframework.security=INFO

# Disable mail auto-config to prevent startup failure
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
